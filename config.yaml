name: yasdi2mqtt
version: "2.0"
slug: yasdi2mqtt
description: "Monitor SMA SunnyBoy solar inverters via YASDI and publish data to MQTT"
url: https://github.com/pkwagner/yasdi2mqtt
arch:
- armhf
- armv7
- aarch64
- amd64
- i386
startup: application
boot: auto
stage: experimental
init: false
legacy: true
options:
  YASDI_CONFIG: "/config/yasdi.ini"
  YASDI_DRIVER_ID: 0
  YASDI_MAX_DEVICE_COUNT: 2
  YASDI_UPDATE_INTERVAL: 15
  MQTT_TOPIC_PREFIX: "solar/inverter"
  MQTT_SERVER: "192.168.37.25"
  MQTT_PORT: 1883
  MQTT_USER: "mqtt"
  MQTT_PASSWORD: "mqttuser"
  MQTT_CLIENT_ID: "yasdi2mqtt"
  LOG_LEVEL: 2
schema:
  YASDI_CONFIG: "str"
  YASDI_DRIVER_ID: "int?"
  YASDI_MAX_DEVICE_COUNT: "int"
  YASDI_UPDATE_INTERVAL: "int"
  MQTT_TOPIC_PREFIX: "str"
  MQTT_SERVER: "str"
  MQTT_PORT: "int"
  MQTT_USER: "str"
  MQTT_PASSWORD: "str"
  MQTT_CLIENT_ID: "str"
  LOG_LEVEL: "int"
host_network: true
map:
- config:rw
